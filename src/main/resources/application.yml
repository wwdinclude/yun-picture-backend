server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天后过期
    session:
      cookie:
        max-age: 2592000
spring:
  application:
    name: yun-picture
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yun_picture
    username: root
    password: 123456
  # Redis配置
  redis:
    database: 0
    host: 127.0.0.1
    port: 6379
    timeout: 5000
  # Session管理
  session:
    store-type: redis
    # Session 30 天后过期
    timeout: 2592000
  # 开放更大的文件上传体积
  servlet:
    multipart:
      max-file-size: 10MB
